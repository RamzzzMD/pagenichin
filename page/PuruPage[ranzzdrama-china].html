            <!-- Header -->

                    <button type="submit" class="absolute right-1.5 w-8 h-8 flex items-center justify-center bg-primary text-white rounded-full hover:bg-primary/80 transition">

            <i class="ph-fill ph-sparkle text-2xl"></i>

    <!-- APP JAVASCRIPT LOGIC -->
    <script>
        const API = {
            base: 'https://api.sansekai.my.id/api/dramabox',
            foryou: () => `${API.base}/foryou`,
            random: () => `${API.base}/randomdrama`,
            latest: () => `${API.base}/latest`,
            trending: () => `${API.base}/populersearch`,
            vip: () => `${API.base}/vip`,
            dubIndoTerbaru: (page=1) => `${API.base}/dubindo?classify=terbaru&page=${page}`,
            dubIndoPopuler: (page=1) => `${API.base}/dubindo?classify=terpopuler&page=${page}`,
            detail: (id) => `${API.base}/detail?bookId=${id}`,
            episodes: (id) => `${API.base}/allepisode?bookId=${id}`,
            search: (query) => `${API.base}/search?query=${encodeURIComponent(query)}`,
            decrypt: (url) => `${API.base}/decrypt?url=${encodeURIComponent(url)}`
        };

        const app = {
            currentView: 'home',
            data: {
                hero: null,
                foryou: [],
                latest: [],
                trending: [],
                dubindo: [],
                vipData: null,
                currentDrama: null,
                currentEpisodes: [],
                pendingVipEpisode: null
            },
            shortsObserver: null,
            
            init: async function() {
                this.showLoader('Menyiapkan...');
                try {
                    await this.loadHomeData();
                    this.renderHome();
                } catch (error) {
                    this.showToast('Gagal memuat data awal. Periksa koneksi Anda.', 'error');
                } finally {
                    this.hideLoader();
                }
            },

            navigate: function(view, param = null) {
                // Clear any running video/shorts observer if navigating away
                if (this.currentView === 'shorts' && view !== 'shorts') {
                    this.cleanupShorts();
                }
                
                // Set padding dynamically based on view (shorts doesn't need top padding to be full screen)
                const mainEl = document.getElementById('main-content');
                if(view === 'shorts') {
                    mainEl.classList.remove('pt-[60px]', 'md:pt-[76px]');
                    // Hide header for immersive mode
                    document.getElementById('main-navbar').style.transform = 'translateY(-100%)';
                } else {
                    mainEl.classList.add('pt-[60px]', 'md:pt-[76px]');
                    document.getElementById('main-navbar').style.transform = 'translateY(0)';
                }

                this.currentView = view;
                this.updateNavUI(view);
                window.scrollTo({top: 0, behavior: 'smooth'});

                document.getElementById('ai-chat-wrapper').classList.add('hidden');
                this.closeAIChat();

                if (view === 'home') this.renderHome();
                else if (view === 'shorts') this.renderShortsView();
                else if (view === 'vip') this.renderVIPView();
                else if (view === 'latest') this.renderListView('Rilis Terbaru', this.data.latest);
                else if (view === 'genre') this.renderGenreView();
                else if (view === 'history') this.renderHistoryView();
                else if (view === 'detail') {
                    this.loadDramaDetail(param);
                    document.getElementById('ai-chat-wrapper').classList.remove('hidden');
                }
                else if (view === 'player') {
                    this.renderPlayer(param.episode, param.episodesData);
                    document.getElementById('ai-chat-wrapper').classList.remove('hidden');
                }
                else if (view === 'search') this.renderListView(`Hasil Pencarian: "${param.query}"`, param.results);
                // Static Pages
                else if (view === 'faq') this.renderStaticPage('Info & FAQ', this.getFAQContent());
                else if (view === 'support') this.renderStaticPage('Dukung Kami', this.getSupportContent());
                else if (view === 'privacy') this.renderStaticPage('Privacy Policy', this.getPrivacyContent());
                else if (view === 'disclaimer') this.renderStaticPage('Disclaimer', this.getDisclaimerContent());
                else if (view === 'contact') this.renderStaticPage('Hubungi Kami', this.getContactContent());
            },

            updateNavUI: function(view) {
                document.querySelectorAll('.nav-btn').forEach(btn => {
                    btn.classList.remove('text-white', 'text-yellow-400');
                    if(btn.dataset.nav === view) {
                        if(view === 'vip') btn.classList.add('text-yellow-400');
                        else btn.classList.add('text-white');
                    }
                });
            },

            fetchData: async function(url) {
                try {
                    const response = await fetch(url);
                    if (!response.ok) {
                        console.warn(`API returned ${response.status} for ${url}`);
                        return null;
                    }
                    return await response.json();
                } catch (error) {
                    console.warn(`Fetch failed for ${url}:`, error.message);
                    return null;
                }
            },

            loadHomeData: async function() {
                const [random, foryou, latestData, trendingData, dubPopuler, vipData] = await Promise.all([
                    this.fetchData(API.random()),
                    this.fetchData(API.foryou()),
                    this.fetchData(API.latest()),
                    this.fetchData(API.trending()),
                    this.fetchData(API.dubIndoPopuler(1)),
                    this.fetchData(API.vip())
                ]);

                if(random && Array.isArray(random) && random.length > 0) this.data.hero = random[0];
                this.data.foryou = Array.isArray(foryou) ? foryou : [];
                this.data.latest = Array.isArray(latestData) ? latestData : [];
                this.data.trending = Array.isArray(trendingData) ? trendingData : [];
                this.data.dubindo = Array.isArray(dubPopuler) ? dubPopuler : [];
                this.data.vipData = vipData || null;
            },

            loadDramaDetail: async function(bookId) {
                this.showLoader();
                try {
                    const detail = await this.fetchData(API.detail(bookId));
                    const episodes = await this.fetchData(API.episodes(bookId));
                    this.data.currentDrama = detail;
                    this.data.currentEpisodes = episodes;
                    this.renderDetail(detail, episodes);
                } catch (error) {
                    this.showToast('Gagal memuat detail drama.', 'error');
                    this.navigate('home');
                } finally {
                    this.hideLoader();
                }
            },

            handleSearch: async function(e, isMobile = false) {
                e.preventDefault();
                const inputId = isMobile ? 'mobile-search-input' : 'search-input';
                const query = document.getElementById(inputId).value.trim();
                
                if (!query) return;
                if (isMobile) this.toggleMobileSearch();
                
                this.showLoader();
                try {
                    const results = await this.fetchData(API.search(query));
                    this.navigate('search', { query, results });
                } catch (error) {
                    this.showToast('Gagal melakukan pencarian.', 'error');
                } finally {
                    this.hideLoader();
                }
            },
            
            renderHome: function() {
                const main = document.getElementById('main-content');
                let html = '';

                if (this.data.hero) {
                    const hero = this.data.hero;
                    const cover = hero.bookCover || hero.coverWap;
                    html += `
                        <div class="relative w-full h-[60vh] md:h-[75vh] group cursor-pointer overflow-hidden" onclick="app.navigate('detail', '${hero.bookId}')">
                            <div class="absolute inset-0 bg-gradient-to-t from-darker via-darker/40 to-transparent z-10"></div>
                            <div class="absolute inset-0 bg-gradient-to-r from-darker/80 to-transparent z-10 hidden md:block"></div>
                            <img src="${cover}" alt="Hero" class="w-full h-full object-cover object-top opacity-80 scale-105 group-hover:scale-100 transition-transform duration-1000 ease-out">
                            
                            <div class="absolute bottom-0 left-0 w-full p-5 lg:p-12 md:pb-16 z-20 flex flex-col justify-end max-w-3xl">
                                <h1 class="text-3xl md:text-5xl lg:text-6xl font-bold text-white mb-3 tracking-tight leading-tight">${hero.bookName}</h1>
                                <p class="text-gray-300 text-sm md:text-base line-clamp-2 md:line-clamp-3 mb-6 font-normal">${hero.introduction}</p>
                                
                                <div class="flex items-center gap-3">
                                    <button onclick="app.navigate('detail', '${hero.bookId}')" class="bg-white text-darker hover:bg-gray-200 font-semibold py-2.5 px-6 md:px-8 rounded-full flex items-center gap-2 transition text-sm md:text-base">
                                        <i class="ph-fill ph-play text-lg"></i> Putar
                                    </button>
                                    <button onclick="app.navigate('detail', '${hero.bookId}')" class="bg-white/10 backdrop-blur-md hover:bg-white/20 text-white font-semibold py-2.5 px-6 rounded-full flex items-center gap-2 transition text-sm md:text-base">
                                        <i class="ph ph-info text-lg"></i> Detail
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                }

                // Tambahkan Drama VIP di Beranda Jika Ada Data dengan layout eksklusif
                let vipRow = '';
                if(this.data.vipData && this.data.vipData.columnVoList && this.data.vipData.columnVoList.length > 0) {
                    const firstVipCol = this.data.vipData.columnVoList[0];
                    vipRow = `
                        <div class="bg-gradient-to-r from-yellow-500/10 to-transparent p-4 md:p-6 rounded-2xl border border-yellow-500/20 my-2">
                            ${this.createRow(`<span class="text-yellow-400 flex items-center gap-2"><i class="ph-fill ph-crown"></i> Koleksi VIP - ${firstVipCol.title}</span>`, firstVipCol.bookList)}
                        </div>
                    `;
                }

                html += '<div class="px-5 lg:px-10 py-8 space-y-10 pb-8 md:pb-12">';
                html += this.createRow('Pilihan Editor', this.data.foryou);
                html += vipRow;
                html += this.createRow('Rilis Terbaru', this.data.latest);
                html += this.createRow('Sedang Tren', this.data.trending);
                html += this.createRow('Dubbing Indonesia', this.data.dubindo);
                html += '</div>';

                // Add Footer
                html += this.renderFooter();

                main.innerHTML = html;
            },

            // --- SHORTS (TIKTOK STYLE) LOGIC & VIEW ---
            renderShortsView: async function() {
                const main = document.getElementById('main-content');
                this.showLoader('Mencari cuplikan seru...');

                try {
                    // Fetch 2 batches of random dramas to ensure a good feed size
                    const [res1, res2] = await Promise.all([
                        this.fetchData(API.random()),
                        this.fetchData(API.random())
                    ]);

                    let feed = [];
                    if (Array.isArray(res1)) feed = feed.concat(res1);
                    if (Array.isArray(res2)) feed = feed.concat(res2);

                    // Remove duplicates
                    const uniqueFeed = [];
                    const ids = new Set();
                    for(const item of feed) {
                        if(!ids.has(item.bookId)) {
                            ids.add(item.bookId);
                            uniqueFeed.push(item);
                        }
                    }

                    if (uniqueFeed.length === 0) {
                        main.innerHTML = '<div class="flex items-center justify-center h-screen text-white"><p>Gagal memuat Shorts. Silakan coba lagi.</p></div>';
                        this.hideLoader();
                        return;
                    }

                    let html = `
                        <!-- Container fixed di atas segalanya (immersive mode) -->
                        <div id="shorts-wrapper" class="fixed inset-0 z-[45] bg-black">
                            
                            <!-- Header Back Button untuk Desktop & Mobile -->
                            <div class="absolute top-0 left-0 w-full p-4 z-[70] bg-gradient-to-b from-black/80 to-transparent flex justify-between items-center">
                                <button onclick="app.navigate('home')" class="w-10 h-10 bg-white/10 backdrop-blur-md rounded-full flex items-center justify-center text-white hover:bg-white/20 transition">
                                    <i class="ph ph-arrow-left text-xl"></i>
                                </button>
                                <span class="text-white/80 font-bold tracking-widest text-sm uppercase mr-2"><i class="ph-fill ph-film-strip text-primary"></i> Shorts</span>
                            </div>

                            <!-- Scroll Container -->
                            <div id="shorts-container" class="w-full h-[100dvh] overflow-y-scroll snap-y snap-mandatory hide-scroll relative">
                    `;

                    uniqueFeed.forEach((drama, index) => {
                        let encryptedUrl = '';
                        if(drama.cdnList && drama.cdnList.length > 0) {
                            const cdn = drama.cdnList.find(c => c.isDefault === 1) || drama.cdnList[0];
                            if (cdn && cdn.videoPathList && cdn.videoPathList.length > 0) {
                                const pathData = cdn.videoPathList.find(p => p.quality === 720) || cdn.videoPathList[0];
                                encryptedUrl = pathData.videoPath;
                            }
                        }

                        const cover = drama.bookCover || drama.coverWap;

            initShortsObserver: function() {
                const container = document.getElementById('shorts-container');
                if(!container) return;

                const options = {
                    root: container,
                    rootMargin: '0px',
                    threshold: 0.6 // Trigger when 60% of the video is visible in the container
                };

                this.shortsObserver = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        const index = entry.target.getAttribute('data-index');
                        const video = document.getElementById(`short-video-${index}`);
                        const playIcon = document.getElementById(`play-icon-${index}`);
                        
                        if (entry.isIntersecting) {
                            this.loadAndPlayShort(entry.target, index, video, playIcon);
                        } else {
                            if(video) {
                                video.pause();
                                if(playIcon) {
                                    playIcon.classList.remove('ph-pause', 'opacity-0');
                                    playIcon.classList.add('ph-play', 'opacity-100');
                                }
                            }
                        }
                    });
                }, options);

                const items = document.querySelectorAll('.short-item');
                items.forEach(item => this.shortsObserver.observe(item));
            },

            loadAndPlayShort: async function(itemEl, index, video, playIcon) {
                const encryptedUrl = itemEl.getAttribute('data-url');
                const loader = document.getElementById(`short-loader-${index}`);
                
                // If already has source and it's the correct decrypted stream, just play
                if (video.src && video.src !== window.location.href && !video.src.includes('undefined')) {
                    const playPromise = video.play();
                    if (playPromise !== undefined) {
                        playPromise.then(_ => {
                            playIcon.classList.remove('ph-play', 'opacity-100');
                            playIcon.classList.add('ph-pause', 'opacity-0');
                        }).catch(e => {
                            console.log("Autoplay prevented", e);
                            playIcon.classList.remove('ph-pause', 'opacity-0');
                            playIcon.classList.add('ph-play', 'opacity-100');
                        });
                    }
                    return;
                }

                if (!encryptedUrl) {
                    this.showToast('URL Video tidak ditemukan', 'error');
                    return;
                }

                loader.classList.remove('hidden');
                
                try {
                    const decryptData = await this.fetchData(API.decrypt(encryptedUrl));
                    if (decryptData && decryptData.success && decryptData.streamUrl) {
                        video.src = decryptData.streamUrl;
                        video.load();
                        
                        const playPromise = video.play();
                        if (playPromise !== undefined) {
                            playPromise.then(_ => {
                                playIcon.classList.remove('ph-play', 'opacity-100');
                                playIcon.classList.add('ph-pause', 'opacity-0');
                                loader.classList.add('hidden');
                                
                                // Hide poster image for smooth transition
                                const poster = document.getElementById(`poster-${index}`);
                                if(poster) poster.style.display = 'none';
                                
                            }).catch(error => {
                                loader.classList.add('hidden');
                                playIcon.classList.remove('ph-pause', 'opacity-0');
                                playIcon.classList.add('ph-play', 'opacity-100');
                                console.log("Autoplay prevented (requires interaction):", error);
                            });
                        }
                    } else {
                        throw new Error("Decrypt failed");
                    }
                } catch (e) {
                    loader.classList.add('hidden');
                    this.showToast('Gagal memuat video Shorts', 'error');
                }
            },

            toggleShortPlay: function(index) {
                const video = document.getElementById(`short-video-${index}`);
                const playIcon = document.getElementById(`play-icon-${index}`);
                if(!video) return;

                if(video.paused) {
                    video.play();
                    playIcon.classList.remove('ph-play', 'opacity-100');
                    playIcon.classList.add('ph-pause', 'opacity-0');
                    
                    // Hide briefly then hide completely
                    setTimeout(() => {
                        playIcon.classList.add('opacity-0');
                    }, 300);

                } else {
                    video.pause();
                    playIcon.classList.remove('ph-pause', 'opacity-0');
                    playIcon.classList.add('ph-play', 'opacity-100');
                }
            },

            cleanupShorts: function() {
                // Hentikan observer dan semua video berjalan saat keluar dari Shorts
                if (this.shortsObserver) {
                    this.shortsObserver.disconnect();
                    this.shortsObserver = null;

                const content = document.getElementById('qris-modal-content');
                modal.classList.add('opacity-0');

                setTimeout(() => {

            confirmQRIS: function() {
                this.closeQRISModal();
                this.showToast('Terima kasih atas dukungannya! Menyiapkan episode VIP...', 'info');
                
                // Simulate unlocking and playing the VIP episode
                if(this.data.pendingVipEpisode !== null) {
                    const epIndex = this.data.pendingVipEpisode.index;
                    const isFirst = this.data.pendingVipEpisode.isFirst;
                    this.data.pendingVipEpisode = null;
                    
                    setTimeout(() => {
                        this.executePlayEpisode(epIndex, isFirst);
                    }, 1000);
                }
            },

            playEpisode: function(episodeIndex, isFirstLoad = false) {
                // Cari data episode saat ini
                const episode = this.data.currentEpisodes.find(ep => ep.chapterIndex === episodeIndex);
                
                // Cek apakah episode berbayar / VIP
                if (episode && (episode.isCharge === 1 || episode.isCharge === true)) {
                    this.data.pendingVipEpisode = { index: episodeIndex, isFirst: isFirstLoad };
                    this.showQRISModal();
                    return; // Hentikan playback, tunggu donasi QRIS
                }

                this.executePlayEpisode(episodeIndex, isFirstLoad);
            },

            executePlayEpisode: function(episodeIndex, isFirstLoad = false) {
                if(isFirstLoad) {
                    this.navigate('player', { episode: episodeIndex, episodesData: this.data.currentEpisodes });
                } else {
                    this.renderPlayer(episodeIndex, this.data.currentEpisodes);
                }
            },

            loadVideoContent: async function(episodeData) {
                const videoSource = document.getElementById('video-source');
                const videoPlayer = document.getElementById('main-player');
                
                try {
                    let encryptedUrl = '';
                    const cdnList = episodeData.cdnList;
                    
                    if (cdnList && cdnList.length > 0) {
                        const cdn = cdnList.find(c => c.isDefault === 1) || cdnList[0];
                        if (cdn && cdn.videoPathList && cdn.videoPathList.length > 0) {
                            const pathData = cdn.videoPathList.find(p => p.quality === 720) || cdn.videoPathList[0];
                            encryptedUrl = pathData.videoPath;
                        }
                    }

                    if (!encryptedUrl) throw new Error('URL video tidak ditemukan');

                    const decryptData = await this.fetchData(API.decrypt(encryptedUrl));
                    
                    if (decryptData && decryptData.success && decryptData.streamUrl) {
                        videoSource.src = decryptData.streamUrl;
                        videoPlayer.load();
                        videoPlayer.play().catch(e => console.log("Autoplay prevented", e));
                    } else {
                        throw new Error('Gagal mendekripsi video');
                    }
                } catch (error) {
                    console.error("Video Load Error:", error);
                    this.showToast(error.message || 'Gagal memuat video episode ini.', 'error');
                }
            },

            hideLoader: function() {

            showToast: function(message, type = 'info') {
                const container = document.getElementById('toast-container');
                const toast = document.createElement('div');
                const bgColor = type === 'error' ? 'bg-red-500' : 'bg-primary';
                const icon = type === 'error' ? 'ph-warning-circle' : 'ph-info';
                
                toast.className = `${bgColor} text-white px-4 py-3 rounded-xl shadow-lg flex items-center gap-3 transform transition-all duration-300 translate-x-full opacity-0 pointer-events-auto w-max max-w-xs text-sm font-medium`;
                toast.innerHTML = `<i class="ph ${icon} text-lg"></i><p>${message}</p>`;
                
                container.appendChild(toast);
                requestAnimationFrame(() => toast.classList.remove('translate-x-full', 'opacity-0'));
                setTimeout(() => {
                    toast.classList.add('translate-x-full', 'opacity-0');
                    setTimeout(() => toast.remove(), 300);
                }, 3000);
            },

            // --- GEMINI AI INTEGRATION ---
            
            callGeminiAPI: async function(prompt, isChat = false) {
                const delays = [1000, 2000, 4000, 8000, 16000];
                const url = 'https://apii.ranzzajaah.my.id/api/ai/gemini-v2';
                
                const systemPrompt = isChat 
                    ? "Kamu adalah asisten AI ahli drama Asia (DramaBox) yang ramah dan asyik. Jawab pertanyaan user seputar drama yang sedang ditonton dengan gaya bahasa Indonesia sehari-hari, jelas, dan tanpa spoiler berlebihan kecuali diminta. Jika pertanyaan di luar drama, arahkan dengan sopan kembali ke topik."
                    : "Kamu adalah kritikus drama yang pandai merangkum cerita menjadi menarik tanpa spoiler. Gunakan bahasa Indonesia kasual yang bikin pembaca antusias dan penasaran.";
                    
                // Menggabungkan instruksi sistem dengan pertanyaan
                const combinedPrompt = `${systemPrompt}\n\n${prompt}`;

                const payload = {
                    prompt: combinedPrompt
                };

                for (let i = 0; i < 5; i++) {
                    try {
                        const response = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                        const data = await response.json();
                        
                        if (data.success && data.result && data.result.answer) {
                            return data.result.answer;
                        } else {
                            throw new Error("Format respons API tidak sesuai.");
                        }
                    } catch (error) {
                        if (i === 4) return "Terjadi kesalahan saat menghubungi AI. Silakan coba lagi nanti.";
                        await new Promise(res => setTimeout(res, delays[i]));
                    }
                }
            },

            generateAISummary: async function() {
                const container = document.getElementById('ai-summary-container');
                const loader = document.getElementById('ai-summary-loader');
                const textEl = document.getElementById('ai-summary-text');
                const drama = this.data.currentDrama;

                container.classList.remove('hidden');
                textEl.classList.add('hidden');
                loader.classList.remove('hidden');

                const prompt = `Buatkan ringkasan hype singkat (maksimal 2 paragraf) tanpa spoiler untuk drama berjudul '${drama.bookName}'. Sinopsis aslinya: '${drama.introduction}'. Tag genre: ${(drama.tags || []).join(', ')}. Buat pembaca sangat penasaran dan ingin segera menonton drama ini!`;
                
                const summary = await this.callGeminiAPI(prompt, false);
                
                loader.classList.add('hidden');
                textEl.classList.remove('hidden');
                
                let formattedText = summary.replace(/\n/g, '<br>');
                formattedText = formattedText.replace(/\*\*(.*?)\*\*/g, '<b class="text-white font-semibold">$1</b>');
                textEl.innerHTML = formattedText;
            },

            toggleAIChat: function() {
                const window = document.getElementById('ai-chat-window');
                window.classList.toggle('hidden');
                if (!window.classList.contains('hidden')) {
                    this.addChatMessage('AI', `Halo! ✨ Ada yang ingin kamu tanyakan soal drama <b class="text-white font-medium">${this.data.currentDrama?.bookName || 'ini'}</b>?`);
                    document.getElementById('ai-chat-input').focus();
                }
            },

            closeAIChat: function() {
                document.getElementById('ai-chat-window').classList.add('hidden');
            },

            handleChatSubmit: async function(e) {
                if (e) e.preventDefault();
                const input = document.getElementById('ai-chat-input');
                const message = input.value.trim();
                if (!message) return;

                input.value = '';
                this.addChatMessage('User', message);
                this.addChatTyping();

                const drama = this.data.currentDrama;
                const context = drama ? `Konteks Drama yang sedang ditonton: Judul='${drama.bookName}', Sinopsis='${drama.introduction}', Tag='${(drama.tags||[]).join(', ')}'.\n\n` : '';
                const prompt = `${context}Pertanyaan User: ${message}`;

                const reply = await this.callGeminiAPI(prompt, true);
                
                this.removeChatTyping();
                
                let formattedReply = reply.replace(/\n/g, '<br>');
                formattedReply = formattedReply.replace(/\*\*(.*?)\*\*/g, '<b class="font-medium text-white">$1</b>');
                this.addChatMessage('AI', formattedReply);
            },

            addChatMessage: function(sender, text) {
                const container = document.getElementById('ai-chat-messages');
                if (sender === 'AI' && container.children.length > 0 && text.includes('Halo! ✨')) return;

                const msgDiv = document.createElement('div');
                msgDiv.className = `flex w-full ${sender === 'User' ? 'justify-end' : 'justify-start'}`;
                
                const bubble = document.createElement('div');
                bubble.className = `max-w-[85%] rounded-2xl px-4 py-2.5 text-[13px] leading-relaxed ${sender === 'User' ? 'bg-white text-darker rounded-br-sm' : 'bg-white/10 text-gray-200 rounded-bl-sm'}`;
                bubble.innerHTML = text;
                
                msgDiv.appendChild(bubble);
                container.appendChild(msgDiv);
                container.scrollTop = container.scrollHeight;
            },

            addChatTyping: function() {
                const container = document.getElementById('ai-chat-messages');
                const typingDiv = document.createElement('div');
                typingDiv.id = 'ai-typing-indicator';
                typingDiv.className = 'flex w-full justify-start';
                typingDiv.innerHTML = `
                    <div class="bg-white/10 rounded-2xl rounded-bl-sm px-4 py-3.5 flex gap-1.5 items-center">
                        <div class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce"></div>
                        <div class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.1s"></div>
                        <div class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                    </div>
                `;
                container.appendChild(typingDiv);
                container.scrollTop = container.scrollHeight;
            },

            removeChatTyping: function() {
                const typing = document.getElementById('ai-typing-indicator');
                if (typing) typing.remove();
            }
        };

        window.addEventListener('DOMContentLoaded', () => {
            app.init();
        });
    </script>
